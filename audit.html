const getClr=s=>s>=90?"#4ade80":s>=80?"#60a5fa":s>=65?"#facc15":s>=45?"#fb923c":"#f87171";
const getGrade=s=>s>=90?"A":s>=80?"B":s>=65?"C":s>=45?"D":"F";
const priBg=p=>({critical:"bg-red-500/20 text-red-400 border border-red-500/30",high:"bg-orange-500/20 text-orange-400 border border-orange-500/30",medium:"bg-yellow-500/20 text-yellow-400 border border-yellow-500/30",low:"bg-slate-500/20 text-slate-400 border border-slate-500/30"})[p]||"bg-slate-500/20 text-slate-400";
function fmtUrl(u){let s=u.trim();if(!/^https?:\/\//i.test(s))s="https://"+s;return s;}

function ring(score,size=64,stroke=5){
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ*(1-score/100),clr=getClr(score);
  return `<div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#2e2e3a" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${clr}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease-out"/>
    </svg>
    <span class="absolute mono font-bold text-base" style="color:${clr}">${score}</span>
  </div>`;
}

function extractIssues(lhr){
  const out=[];
  for(const[id,a]of Object.entries(lhr.audits||{})){
    if(!AUDIT_TASKS[id])continue;
    if(a.score!==null&&a.score!==undefined&&a.score<0.9)
      out.push({id,title:a.title,score:a.score,...AUDIT_TASKS[id]});
  }
  return out;
}

function buildSprint(issues){
  const seen=new Set(),tasks=[];
  for(const i of issues){if(seen.has(i.task))continue;seen.add(i.task);tasks.push({...i,cost:Math.max(49,Math.round(i.hours*RATE))});}
  tasks.sort((a,b)=>{const po={critical:0,high:1,medium:2,low:3};return(a.sprint-b.sprint)||(po[a.priority]-po[b.priority]);});
  const totalH=tasks.reduce((s,t)=>s+t.hours,0),totalC=tasks.reduce((s,t)=>s+t.cost,0);
  let pkg;
  if(totalC<=499)pkg={name:"Quick Fix",price:"\u00a3399\u2013499",time:"1 week"};
  else if(totalC<=1299)pkg={name:"Professional Rebuild",price:"\u00a3899\u20131,299",time:"2\u20133 weeks"};
  else if(totalC<=2499)pkg={name:"Premium Overhaul",price:"\u00a31,799\u20132,499",time:"4\u20136 weeks"};
  else pkg={name:"Full Rebuild",price:"Custom quote",time:"6\u20138 weeks"};
  return{tasks,totalH,totalC,pkg};
}
